<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>用户列表</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ddd; padding: 0.5rem 0.75rem; text-align: left; }
        th { background: #f5f5f5; }
        .message { color: #0a7; margin-bottom: 1rem; }
        .actions form { display: inline; }
        a.button { display: inline-block; padding: 0.4rem 0.8rem; background: #2563eb; color: #fff; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
<h1>用户管理</h1>

<p class="message" th:if="${message}" th:text="${message}"></p>

<p><a class="button" th:href="@{/users/new}">新建用户</a></p>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>姓名</th>
        <th>邮箱</th>
        <th>操作</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user : ${users}">
        <td th:text="${user.id}">1</td>
        <td th:text="${user.name}">Name</td>
        <td th:text="${user.email}">email@example.com</td>
        <td class="actions">
            <a th:href="@{/users/{id}/edit(id=${user.id})}">编辑</a>
            <form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" style="display:inline">
                <button type="submit">删除</button>
            </form>
        </td>
    </tr>
    <tr th:if="${#lists.isEmpty(users)}">
        <td colspan="4">暂无用户</td>
    </tr>
    </tbody>
</table>
</body>
</html>
