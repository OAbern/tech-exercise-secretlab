<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${user.id != null} ? '编辑用户' : '新建用户'">用户表单</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 480px; margin: 2rem auto; padding: 0 1rem; }
        label { display: block; margin-top: 1rem; font-weight: 600; }
        input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
        .error { color: #b91c1c; font-size: 0.875rem; margin-top: 0.25rem; }
        button { margin-top: 1.5rem; padding: 0.5rem 1rem; }
        a { margin-left: 1rem; }
    </style>
</head>
<body>
<h1 th:text="${user.id != null} ? '编辑用户' : '新建用户'">用户表单</h1>

<form th:action="${user.id != null} ? @{/users/{id}(id=${user.id})} : @{/users}"
      th:object="${user}" method="post">
    <label for="name">姓名</label>
    <input id="name" type="text" th:field="*{name}"/>
    <p class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>

    <label for="email">邮箱</label>
    <input id="email" type="email" th:field="*{email}"/>
    <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>

    <button type="submit">保存</button>
    <a th:href="@{/users}">返回列表</a>
</form>
</body>
</html>
