spring:
  application:
    name: mvc-demo
  datasource:
    url: jdbc:h2:mem:mvcdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 50
      connection-timeout: 30000
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always          # run schema.sql on every startup
  jpa:
    hibernate:
      ddl-auto: none        # schema managed by schema.sql, not Hibernate
    defer-datasource-initialization: true   # ensure schema.sql runs before JPA
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug
